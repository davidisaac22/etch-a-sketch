<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/android-chrome-512x512.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/android-chrome-512x512.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="./index.js" defer></script>
    
</head>
<body>
    <div class="etch-a-sketch">
        <div class="knob left"></div>
        <div class="knob right"></div>
        <div class="controls">
            <select name="modes" id="modes">
                <option value="drawing">Drawing</option>
                <option value="random">Random</option>
            </select>
            <button id="reset">Reset</button>
        </div>
        <div class="screen">
            <div class="container"></div>
        </div>
    </div>
</body>
</html>
